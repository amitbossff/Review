<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmitTG</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-200 p-4">

<div class="max-w-xl mx-auto space-y-4">

<h2 class="text-xl font-semibold text-blue-400 text-center">AmitTG</h2>

<textarea id="inputList" placeholder="Paste list..."
class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700"></textarea>

<input id="mainLink" placeholder="Enter link"
class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700">

<input id="amount" placeholder="Enter amount"
class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700">

<div id="dynamicInputs" class="grid grid-cols-2 gap-3"></div>

<button onclick="splitText()"
class="w-full bg-green-600 hover:bg-green-700 p-3 rounded-lg">
Submit
</button>

<div id="output" class="space-y-4"></div>
<div id="linkSection" class="space-y-2"></div>

<button onclick="copyAllText()"
class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg">
Copy All
</button>

<p id="message" class="text-green-400 text-sm text-center"></p>

</div>

<script>
const API = "https://mapreview.amittgofficials.workers.dev";

let users = [];
let names = [];
let nameTags = {};

async function loadUsers() {
    const res = await fetch(API + "/get-users");
    users = await res.json();

    names = users.map(u => u.name);

    nameTags = {};
    users.forEach(u => nameTags[u.name] = u.username);

    renderInputs();
}

function renderInputs() {
    const container = document.getElementById("dynamicInputs");
    container.innerHTML = "";

    users.forEach(user => {
        container.innerHTML += `
        <div>
            <label class="text-sm text-gray-400">${user.name}</label>
            <input type="number" id="${user.name}Count" value="${user.count}"
            class="w-full p-2 rounded bg-gray-800 border border-gray-700">
        </div>`;
    });
}

function splitText() {

    const output = document.getElementById("output");
    const linkSection = document.getElementById("linkSection");

    output.innerHTML = "";
    linkSection.innerHTML = "";

    let text = document.getElementById("inputList").value.trim();
    let link = document.getElementById("mainLink").value.trim();
    let amount = document.getElementById("amount").value.trim();

    if (!text) return;

    let items = text.match(/\d+\.[\s\S]*?(?=\d+\.|$)/g);
    if (!items) return;

    items = items.map(x => x.trim());
    let pointer = 0;

    names.forEach(name => {
        let count = parseInt(document.getElementById(name + "Count").value) || 0;

        let assigned = items.slice(pointer, pointer + count);
        pointer += count;

        let tag = nameTags[name] || "";

        let html = `<div class="bg-gray-800 p-3 rounded-lg">
        <h3 class="text-blue-400 font-semibold mb-2">${name} ${tag} (${assigned.length})</h3>`;

        assigned.forEach(sentence => {
            let number = sentence.match(/^\d+\./)[0];
            let rest = sentence.replace(/^\d+\.\s*/, "").trim();
            html += `<p class="text-sm mb-1">${number} ${rest}</p>`;
        });

        html += `</div>`;
        output.innerHTML += html;
    });

    if (link) linkSection.innerHTML += `<div class="bg-gray-800 p-2 rounded text-center">🔗 ${link}</div>`;
    if (amount) linkSection.innerHTML += `<div class="bg-gray-800 p-2 rounded text-center">💰 ${amount}</div>`;
}

function copyAllText() {
    let txt = document.getElementById("output").innerText;

    let link = document.getElementById("mainLink").value;
    let amount = document.getElementById("amount").value;

    if (link) txt += "\nLINK:\n" + link;
    if (amount) txt += "\nAMOUNT:\n" + amount;

    navigator.clipboard.writeText(txt);

    document.getElementById("message").innerText = "✔ Copied";
    setTimeout(()=>document.getElementById("message").innerText="",1500);
}

loadUsers();
</script>

</body>
</html>
