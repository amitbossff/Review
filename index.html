<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmitTG</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0d1117] text-[#e6edf3] p-4">

<div class="max-w-2xl mx-auto bg-[#161b22] border border-[#2d333b] rounded-xl p-4 space-y-4">

<h2 class="text-center text-blue-400 text-lg font-semibold">AmitTG</h2>

<label class="text-sm text-gray-400">Paste Your Comment List</label>
<textarea id="inputList"
class="w-full h-36 p-3 rounded-lg bg-[#0d1117] border border-[#30363d]"></textarea>

<label class="text-sm text-gray-400">Link</label>
<input id="mainLink"
class="w-full p-3 rounded-lg bg-[#0d1117] border border-[#30363d]">

<label class="text-sm text-gray-400">Amount</label>
<input id="amount" type="number"
class="w-full p-3 rounded-lg bg-[#0d1117] border border-[#30363d]">

<!-- Dynamic Users -->
<div id="dynamicInputs" class="grid grid-cols-2 gap-3"></div>

<button onclick="splitText()"
class="w-full bg-green-600 hover:bg-green-700 p-3 rounded-lg">
Submit
</button>

<div id="output" class="space-y-4"></div>
<div id="linkSection" class="space-y-2"></div>

<button id="copyAllButton" onclick="copyAllText()"
class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg hidden">
Copy All
</button>

<p id="message" class="text-green-400 text-sm text-center"></p>

</div>

<script>
const API = "https://mapreview.amittgofficials.workers.dev";

let users = [];
let names = [];
let nameTags = {};

// LOAD USERS
async function loadUsers() {
    const res = await fetch(API + "/get-users");
    users = await res.json();

    names = users.map(u => u.name);

    nameTags = {};
    users.forEach(u => nameTags[u.name] = u.username);

    renderInputs();
}

// INPUTS
function renderInputs() {
    const container = document.getElementById("dynamicInputs");
    container.innerHTML = "";

    users.forEach(user => {
        container.innerHTML += `
        <div>
            <label class="text-sm text-gray-400">${user.name}</label>
            <input type="number" id="${user.name}Count" value="${user.count}"
            class="w-full p-2 rounded bg-[#0d1117] border border-[#30363d]">
        </div>`;
    });
}

// 🔥 ORIGINAL LOGIC PRESERVED
function splitText() {

    const output = document.getElementById("output");
    const linkSection = document.getElementById("linkSection");

    output.innerHTML = "";
    linkSection.innerHTML = "";
    document.getElementById("copyAllButton").style.display = "none";

    let text = document.getElementById("inputList").value.trim();
    let link = document.getElementById("mainLink").value.trim();
    let amount = document.getElementById("amount").value.trim();

    if (!text) return;

    let items = text.match(/\d+\.[\s\S]*?(?=\d+\.|$)/g);
    if (!items) return;

    items = items.map(x => x.trim());
    let pointer = 0;

    names.forEach(name => {
        let count = parseInt(document.getElementById(name + "Count").value) || 0;

        let assigned = items.slice(pointer, pointer + count);
        pointer += count;

        let tag = nameTags[name] || "";

        let html = `
        <div>
        <h3 class="text-blue-400 font-semibold border-b border-[#30363d] pb-1">
        **${name} ${tag} (${assigned.length})**
        </h3>
        <ul class="mt-2 space-y-2">`;

        assigned.forEach(sentence => {
            let number = sentence.match(/^\d+\./)[0];
            let rest = sentence.replace(/^\d+\.\s*/, "").trim();

            html += `
            <li class="bg-[#0d1117] border border-[#2d333b] rounded p-2">
                <code class="block text-sm text-gray-300 font-mono">
                **${number}** \`${rest}\`
                </code>
            </li>`;
        });

        html += "</ul></div>";

        output.innerHTML += html;
    });

    if (link !== "") {
        linkSection.innerHTML += `
        <div class="bg-[#0d1117] border border-[#30363d] rounded p-2 text-center text-blue-400">
        🔗 ${link}
        </div>`;
    }

    if (amount !== "") {
        linkSection.innerHTML += `
        <div class="bg-[#0d1117] border border-[#30363d] rounded p-2 text-center text-blue-400">
        💰 Amount: ${amount}
        </div>`;
    }

    document.getElementById("copyAllButton").style.display = "block";
}

// COPY (UNCHANGED)
function copyAllText() {

    const sections = document.querySelectorAll('#output h3');
    let txt = "";

    sections.forEach(section => {
        txt += section.textContent + "\n\n";
        const list = section.nextElementSibling;
        list.querySelectorAll("code").forEach(c => {
            txt += c.textContent + "\n\n";
        });
    });

    let link = document.getElementById("mainLink").value.trim();
    let amount = document.getElementById("amount").value.trim();

    if (link !== "") txt += "----- LINK -----\n" + link + "\n\n";
    if (amount !== "") txt += "----- AMOUNT -----\n" + amount + "\n\n";

    navigator.clipboard.writeText(txt).then(() => {
        document.getElementById("message").textContent = "✔ Copied";
        setTimeout(() => document.getElementById("message").textContent = "", 1500);
    });
}

loadUsers();
</script>

</body>
</html>
