<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0d1117] text-white p-4">

<div class="max-w-md mx-auto space-y-4">

<h2 class="text-center text-xl font-semibold text-blue-400">Admin Panel</h2>

<button onclick="openAdd()"
class="w-full bg-green-600 p-3 rounded-lg">
➕ Add User
</button>

<!-- USER LIST -->
<div id="userList" class="space-y-3"></div>

</div>

<!-- ADD POPUP -->
<div id="addPopup" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">
<div class="bg-[#161b22] p-5 rounded-xl w-full max-w-sm space-y-3">

<h3 class="text-center text-blue-400">Add User</h3>

<input id="addName" placeholder="Name" class="input">
<input id="addUsername" placeholder="@username" class="input">
<input id="addCount" type="number" placeholder="Count" class="input">

<button id="addBtn" onclick="addUser()" class="btn-disabled" disabled>Save</button>
<button onclick="closeAdd()" class="w-full bg-gray-600 p-2 rounded">Cancel</button>

</div>
</div>

<!-- EDIT POPUP -->
<div id="editPopup" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">
<div class="bg-[#161b22] p-5 rounded-xl w-full max-w-sm space-y-3">

<h3 class="text-center text-blue-400">Edit User</h3>

<input id="editUsername" placeholder="@username" class="input">
<input id="editCount" type="number" placeholder="Count" class="input">

<button id="editBtn" onclick="updateUser()" class="btn-disabled" disabled>Update</button>
<button onclick="closeEdit()" class="w-full bg-gray-600 p-2 rounded">Cancel</button>

</div>
</div>

<p id="msg" class="text-center text-green-400"></p>

<script>
const API = "https://mapreview.amittgofficials.workers.dev";

let users = [];
let currentEditName = "";

// Tailwind helper classes
const inputClass = "w-full p-2 rounded bg-[#0d1117] border border-[#30363d]";
const btnDisabled = "w-full bg-green-600 p-2 rounded opacity-50 cursor-not-allowed";

document.querySelectorAll(".input").forEach(i => i.className = inputClass);

// LOAD USERS
async function loadUsers() {
    const res = await fetch(API + "/get-users");
    users = await res.json();
    renderUsers();
}

// RENDER USERS
function renderUsers() {
    const container = document.getElementById("userList");
    container.innerHTML = "";

    users.forEach(user => {
        container.innerHTML += `
        <div class="bg-[#161b22] border border-[#2d333b] p-3 rounded-lg">
            <div class="flex justify-between items-center">
                <div>
                    <p class="font-semibold">${user.name}</p>
                    <p class="text-sm text-gray-400">${user.username} | ${user.count}</p>
                </div>

                <div class="flex gap-2">
                    <button onclick="openEdit('${user.name}','${user.username}','${user.count}')"
                    class="bg-yellow-500 px-2 py-1 rounded text-black">Edit</button>

                    <button onclick="removeUser('${user.name}')"
                    class="bg-red-600 px-2 py-1 rounded">X</button>
                </div>
            </div>
        </div>`;
    });
}

// ADD POPUP
function openAdd() {
    document.getElementById("addPopup").classList.remove("hidden");
}
function closeAdd() {
    document.getElementById("addPopup").classList.add("hidden");
}

// EDIT POPUP
function openEdit(name, username, count) {
    currentEditName = name;

    document.getElementById("editUsername").value = username;
    document.getElementById("editCount").value = count;

    document.getElementById("editPopup").classList.remove("hidden");
}
function closeEdit() {
    document.getElementById("editPopup").classList.add("hidden");
}

// VALIDATION ADD
["addName","addUsername","addCount"].forEach(id=>{
    document.getElementById(id).addEventListener("input",()=>{
        const valid =
            document.getElementById("addName").value &&
            document.getElementById("addUsername").value &&
            document.getElementById("addCount").value;

        const btn = document.getElementById("addBtn");
        btn.disabled = !valid;
        btn.classList.toggle("opacity-50", !valid);
    });
});

// VALIDATION EDIT
["editUsername","editCount"].forEach(id=>{
    document.getElementById(id).addEventListener("input",()=>{
        const valid =
            document.getElementById("editUsername").value &&
            document.getElementById("editCount").value;

        const btn = document.getElementById("editBtn");
        btn.disabled = !valid;
        btn.classList.toggle("opacity-50", !valid);
    });
});

// ADD USER
async function addUser() {
    await fetch(API + "/add-user", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name: addName.value,
            username: addUsername.value,
            count: addCount.value
        })
    });

    closeAdd();
    loadUsers();
}

// UPDATE USER
async function updateUser() {
    await fetch(API + "/update-user", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name: currentEditName,
            username: editUsername.value,
            count: editCount.value
        })
    });

    closeEdit();
    loadUsers();
}

// REMOVE USER
async function removeUser(name) {
    await fetch(API + "/remove-user", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ name })
    });

    loadUsers();
}

loadUsers();
</script>

</body>
</html>
