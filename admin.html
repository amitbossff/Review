<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-4">

<div class="max-w-md mx-auto space-y-4">

<h2 class="text-xl text-center text-blue-400">Admin Panel</h2>

<button onclick="openAdd()"
class="w-full bg-green-600 p-3 rounded-lg">
Add User
</button>

<button onclick="removeUser()"
class="w-full bg-red-600 p-3 rounded-lg">
Remove User
</button>

</div>

<!-- POPUP -->
<div id="popup"
class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">

<div class="bg-gray-800 p-5 rounded-lg w-full max-w-sm space-y-3">

<input id="name" placeholder="Name"
class="w-full p-2 rounded bg-gray-900 border border-gray-700">

<input id="username" placeholder="@username"
class="w-full p-2 rounded bg-gray-900 border border-gray-700">

<input id="count" type="number" placeholder="Count"
class="w-full p-2 rounded bg-gray-900 border border-gray-700">

<div class="flex gap-2">
<button onclick="addUser()"
class="flex-1 bg-green-600 p-2 rounded">
Save
</button>

<button onclick="closeAdd()"
class="flex-1 bg-gray-600 p-2 rounded">
Cancel
</button>
</div>

</div>
</div>

<script>
const API = "https://mapreview.amittgofficials.workers.dev";

function openAdd() {
    document.getElementById("popup").classList.remove("hidden");
}

function closeAdd() {
    document.getElementById("popup").classList.add("hidden");
}

async function addUser() {
    const name = document.getElementById("name").value;
    const username = document.getElementById("username").value;
    const count = document.getElementById("count").value;

    await fetch(API + "/add-user", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, username, count })
    });

    alert("User Added");
    closeAdd();
}

async function removeUser() {
    const name = prompt("Enter user name");

    if (!name) return;

    await fetch(API + "/remove-user", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
    });

    alert("User Removed");
}
</script>

</body>
</html>
